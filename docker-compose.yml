version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=development
      - PORT=4000
      - CORS_ORIGINS=http://localhost:3000,http://localhost:80
      - LOG_LEVEL=debug
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
    depends_on:
      dynamodb-local:
        condition: service_healthy
    networks:
      - app-network

  client:
    build:
      context: .
      dockerfile: docker/client.Dockerfile
    ports:
      - '80:80'
    depends_on:
      - server
    networks:
      - app-network

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - '8000:8000'
    command: '-jar DynamoDBLocal.jar -sharedDb -inMemory'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8000/shell/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - app-network

  localstack:
    image: localstack/localstack:latest
    ports:
      - '4566:4566'
    environment:
      - SERVICES=s3,sqs
      - DEFAULT_REGION=us-east-1
      - DEBUG=0
    healthcheck:
      test: ['CMD-SHELL', 'awslocal s3 ls || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
